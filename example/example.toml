# example.toml
# login information
[credentials]
  username = "admin" #not required, can be entered using the credentials argument
  password = "<insert password>" #not required, can be entered using the credentials argument
  api_url = "<insert api_url>" #not required, can be entered using the credentials argument

# new log information
[autolog]
  title = "Destination Reached"
  description = "The beam has reached a new destination"
  level = "info"
  logbook = "tests"
  #attachment_file = "path/to/file/file.plt"

# pv information
[pv]
  #check_time = 3 #not required. Waiting time for the loop to check pv value, default value: 5s
  trigger_pv_name = "SL-APP-MCS:BOM-CPU:BeamDestCode"
  trigger_pv_value = [1,2,3,4] #list of integer

[pv.condition]
  condition_pv_name = "SL-APP-MCS:BOM-CPU:StartBeamCmd"
  condition_pv_value = [1] #list of integer

[pv.context]
  info_pv_name = "SL-APP-MCS:BOM-CPU:BeamDestCodeTextIn" #Display pv value as string
